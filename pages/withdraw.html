<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw Funds</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white">

<div class="max-w-4xl mx-auto p-8">

<h1 class="text-4xl font-bold mb-8">
Withdraw Funds
</h1>

<div class="bg-gray-900 rounded-xl p-6">

<label class="block mb-2 text-gray-400">
Amount
</label>

<input
id="amount"
type="number"
class="w-full p-3 rounded bg-gray-800 mb-6"
placeholder="500">

<label class="block mb-2 text-gray-400">
Destination
</label>

<select class="w-full p-3 rounded bg-gray-800 mb-6">
<option>Bank Account</option>
<option>Crypto Wallet</option>
</select>

<button
class="bg-red-600 px-6 py-3 rounded-lg hover:bg-red-700">
Withdraw
</button>

</div>

<a href="/" class="inline-block mt-8 text-blue-400">
← Back to Dashboard
</a>

</div>

</body>
</html>
