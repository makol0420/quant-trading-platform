<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quant Trading Platform</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="/static/style.css">

</head>

<body class="bg-gray-950 text-white">

<div class="container mx-auto p-6">

    <div class="flex justify-between items-center">

        <div>
            <h1 class="text-4xl font-bold">
                Quant Trading Platform
            </h1>

            <p class="text-gray-400">
                AI Powered Trading Dashboard
            </p>
        </div>

        <div class="bg-green-600 px-4 py-2 rounded-lg">
            LIVE
        </div>

    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-5 mt-8">

        <div class="card">
            <h2>Portfolio</h2>
            <p id="portfolio">$0</p>
        </div>

        <div class="card">
            <h2>Daily P/L</h2>
            <p id="pnl">$0</p>
        </div>

        <div class="card">
            <h2>Open Trades</h2>
            <p id="trades">0</p>
        </div>

        <div class="card">
            <h2>Win Rate</h2>
            <p id="winrate">0%</p>
        </div>

    </div>

    <div class="bg-gray-900 mt-8 rounded-xl p-6">

        <canvas id="equityChart"></canvas>

    </div>

    <div class="grid md:grid-cols-2 gap-6 mt-8">

        <div class="bg-gray-900 rounded-xl p-6">

            <h2 class="text-xl mb-4">
                Trading Status
            </h2>

            <pre id="status">
Loading...
            </pre>

        </div>

        <div class="bg-gray-900 rounded-xl p-6">

            <h2 class="text-xl mb-4">
                Controls
            </h2>

            <button class="bg-green-600 px-5 py-3 rounded-lg">
                Start Bot
            </button>

            <button class="bg-red-600 px-5 py-3 rounded-lg ml-3">
                Stop Bot
            </button>

        </div>

    </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
